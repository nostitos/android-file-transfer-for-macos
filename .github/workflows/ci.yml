name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      TARGET_ARCH: ${{ matrix.arch }}
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      NATIVE_DEPS_PREFIX: ${{ github.workspace }}/.native-deps/${{ matrix.arch }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install build tools
        run: brew install pkg-config
      - run: npm ci
      - run: npm run native:deps -- ${{ matrix.arch }}
      - run: npm run check
      - run: npm run check:public-source
      - run: npm audit --omit=dev --audit-level=high
